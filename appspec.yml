version: 0.0
os: linux

files:
  - source: /
    destination: /opt/github-ec2-cicd

hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 180
      runas: root

  AfterInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
      runas: root
    - location: scripts/configure_service.sh
      timeout: 180
      runas: root

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 180
      runas: root